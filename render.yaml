services:
  - type: web
    name: champions-league-foari
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SESSION_SECRET
        generateValue: true
      - key: PUBLIC_BASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
